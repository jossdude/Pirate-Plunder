<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plunder: A Pirates Life</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="spinner spinner-left"></div>
    <div class="spinner spinner-right"></div>
    
    <div class="container">
        <header>
            <h1>Plunder: A Pirates Life</h1>
            <p class="subtitle">Roll the dice, plunder the high seas!</p>
        </header>
        
        <main>
            <div class="randomizers">
                <div class="randomizer-box">
                    <h2>Letter Roll</h2>
                    <div class="wheel-container">
                        <svg class="wheel" id="letter-wheel" viewBox="0 0 300 300">
                            <circle cx="150" cy="150" r="140" fill="none" stroke="var(--pirate-gold)" stroke-width="2"/>
                            <g id="letter-wheel-segments"></g>
                            <circle cx="150" cy="150" r="20" fill="var(--pirate-dark-blue)" stroke="var(--pirate-gold)" stroke-width="3"/>
                        </svg>
                        <div class="wheel-pointer"></div>
                        <div class="result-display" id="letter-result">-</div>
                    </div>
                    <p class="label">A to L</p>
                </div>
                
                <div class="randomizer-box">
                    <h2>Number Roll</h2>
                    <div class="wheel-container">
                        <svg class="wheel" id="number-wheel" viewBox="0 0 300 300">
                            <circle cx="150" cy="150" r="140" fill="none" stroke="var(--pirate-gold)" stroke-width="2"/>
                            <g id="number-wheel-segments"></g>
                            <circle cx="150" cy="150" r="20" fill="var(--pirate-dark-blue)" stroke="var(--pirate-gold)" stroke-width="3"/>
                        </svg>
                        <div class="wheel-pointer"></div>
                        <div class="result-display" id="number-result">-</div>
                    </div>
                    <p class="label">1 to 18</p>
                </div>
            </div>
            
            <button class="roll-button" id="roll-button">
                <span class="button-text">Spin the Spinners!</span>
                <span class="button-icon">🎲</span>
            </button>
        </main>
        
        <footer>
            <p>May the winds be in your favor!</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
